                const offscreen = document.createElement("canvas");
                offscreen.width = W;
                offscreen.height = H;
                const offCtx = offscreen.getContext("2d");

                let mouseX = -9999,
                    mouseY = -9999;

                // Intro sweep state
                const INTRO_DURATION = 1200; // ms total sweep
                const INTRO_EDGE = 120; // px width of the dissolve edge
                const INTRO_MAX_PIX = 28; // block size at the "unresolved" front
                let introStart = null;
                let introComplete = false;

                function getIntroBlockSize(x, elapsed) {
                    // sweepX is the x-position that has fully resolved
                    const sweepX =
                        (elapsed / INTRO_DURATION) * (W + INTRO_EDGE) -
                        INTRO_EDGE;
                    const dist = x - sweepX;
                    if (dist <= 0) return 1; // already resolved
                    if (dist >= INTRO_EDGE) return INTRO_MAX_PIX; // not yet touched
                    // in the dissolve band: interpolate with some randomness per column
                    const t = dist / INTRO_EDGE;
                    return Math.max(1, Math.round(t * INTRO_MAX_PIX));
                }

                function draw(timestamp) {
                    if (!introStart) introStart = timestamp;
                    const elapsed = timestamp - introStart;
                    if (elapsed >= INTRO_DURATION) introComplete = true;

                    const rect = canvas.getBoundingClientRect();
                    const localX = mouseX - rect.left;
                    const localY = mouseY - rect.top;

                    offCtx.drawImage(img, 0, 0, W, H);
                    ctx.clearRect(0, 0, W, H);

                    const STEP = 3;
                    let x = 0;
                    while (x < W) {
                        let y = 0;
                        while (y < H) {
                            const cx = x + STEP / 2;
                            const cy = y + STEP / 2;

                            // Mouse hover pixelation
                            const dist = Math.hypot(cx - localX, cy - localY);
                            const t = Math.max(0, 1 - dist / RADIUS);
                            let bs = Math.max(
                                STEP,
                                Math.round(STEP + t * (MAX_PIXEL - STEP)),
                            );

                            // Intro sweep overrides during animation
                            if (!introComplete) {
                                const introBS = getIntroBlockSize(x, elapsed);
                                bs = Math.max(bs, introBS);
                            }

                            const sx = Math.min(W - 1, Math.floor(cx));
                            const sy = Math.min(H - 1, Math.floor(cy));
                            const pix = offCtx.getImageData(sx, sy, 1, 1).data;

                            ctx.fillStyle =
                                "rgb(" +
                                pix[0] +
                                "," +
                                pix[1] +
                                "," +
                                pix[2] +
                                ")";
                            ctx.fillRect(x, y, bs, bs);
                            y += bs;
                        }
                        x += STEP;
                    }
                    requestAnimationFrame(draw);
                }

                img.onload = function () {
                    requestAnimationFrame(draw);
                };

                document.addEventListener("mousemove", function (e) {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                });
                document.addEventListener("mouseleave", function () {
                    mouseX = -9999;
                    mouseY = -9999;
                });
            })();
